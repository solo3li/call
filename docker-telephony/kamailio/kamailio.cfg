#!KAMAILIO

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=udp:0.0.0.0:5062
listen=tcp:0.0.0.0:5062

loadmodule "pv.so"
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "siputils.so"
loadmodule "textops.so"

# Configure RTPEngine
loadmodule "rtpengine.so"
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine:22222")

request_route {
    # Basic sanity checks
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
    
    # Handle registrations locally to keep client happy
    if (is_method("REGISTER")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Route all other requests directly to Asterisk
    $du = "sip:asterisk:5060";
    
    if (is_method("INVITE")) {
        record_route();
        rtpengine_manage("replace-origin replace-session-connection");
    }
    
    t_on_reply("REPLY_ROUTE");
    if (!t_relay()) {
        sl_reply_error();
    }
}

onreply_route[REPLY_ROUTE] {
    if (has_body("application/sdp")) {
        rtpengine_manage("replace-origin replace-session-connection");
    }
}
