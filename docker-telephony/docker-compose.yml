version: '3.8'

services:
  redis:
    image: redis:6-alpine
    container_name: redis
    networks:
      - telephony-net
    ports:
      - "6379:6379"

  livekit-server:
    image: livekit/livekit-server:v1.9.0
    container_name: livekit-server
    network_mode: "host"
    command: ["--keys", "devkey: devsecret", "--redis-host", "127.0.0.1:6379", "--node-ip", "167.71.66.188"]

  livekit-sip:
    image: livekit/sip:latest
    container_name: livekit-sip
    network_mode: "host"
    environment:
      - "SIP_CONFIG_BODY=api_key: 'devkey'\napi_secret: 'devsecret'\nws_url: 'ws://127.0.0.1:7880'\nredis:\n  address: '127.0.0.1:6379'\nsip_port: 5061\nrtp_port:\n  start: 11000\n  end: 11500\nuse_external_ip: false\nlogging:\n  level: debug"

  asterisk:
    image: local-asterisk:latest
    container_name: asterisk
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    extra_hosts:
      - "backend:167.71.66.188"
      - "backend-service:167.71.66.188"
      - "livekit-sip:167.71.66.188"
      - "livekit-server:167.71.66.188"

  gemini-agent:
    image: local-gemini-agent:latest
    container_name: gemini-agent
    network_mode: "host"
    environment:
      - GOOGLE_API_KEY=REDACTED_API_KEY
      - LIVEKIT_URL=ws://127.0.0.1:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=devsecret
      - BACKEND_URL=http://api-call.167.71.66.188.nip.io

  db:
    image: postgres:15-alpine
    container_name: db
    networks:
      - telephony-net
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=foodrms
    volumes:
      - /var/lib/rancher/k3s/storage/pvc-fd9a5a74-5c42-4ed1-ba17-b28dec3fbfd7_default_postgres-pvc:/var/lib/postgresql/data

  backend:
    image: foodrms-backend:latest
    container_name: backend
    networks:
      - telephony-net
    ports:
      - "80:5109"
      - "5109:5109"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=foodrms;Username=postgres;Password=postgres
    volumes:
      - /var/lib/rancher/k3s/storage/pvc-39468822-95c2-4c0c-928e-600430a9aada_default_backend-uploads-pvc:/app/wwwroot/uploads
    depends_on:
      - db

networks:
  telephony-net:
    driver: bridge
