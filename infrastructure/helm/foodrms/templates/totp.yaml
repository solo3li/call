apiVersion: apps/v1
kind: Deployment
metadata:
  name: totp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: totp
  template:
    metadata:
      labels:
        app: totp
    spec:
      containers:
      - name: totp
        image: "{{ .Values.totp.image }}"
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: totp
spec:
  ports:
  - port: 8082
    targetPort: 80
  selector:
    app: totp
