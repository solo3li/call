apiVersion: v1
kind: ConfigMap
metadata:
  name: kamailio-config
data:
  kamailio.cfg: |
    #!KAMAILIO
    
    listen=udp:0.0.0.0:5060
    listen=tcp:0.0.0.0:5060
    listen=udp:0.0.0.0:5062
    listen=tcp:0.0.0.0:5062
    
    loadmodule "pv.so"
    loadmodule "sl.so"
    loadmodule "tm.so"
    loadmodule "rr.so"
    loadmodule "maxfwd.so"
    loadmodule "siputils.so"
    loadmodule "textops.so"
    
    # Configure RTPEngine
    loadmodule "rtpengine.so"
    modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:22222")
    
    request_route {
        # Basic sanity checks
        if (!mf_process_maxfwd_header("10")) {
            sl_send_reply("483", "Too Many Hops");
            exit;
        }
        
        # Handle registrations locally to keep client happy
        if (is_method("REGISTER")) {
            sl_send_reply("200", "OK");
            exit;
        }

        # Route all other requests directly to Asterisk
        $du = "sip:my-asterisk-0.asterisk-headless.default.svc.cluster.local:5060";
        
        if (is_method("INVITE")) {
            record_route();
            rtpengine_manage("replace-origin replace-session-connection");
        }
        
        t_on_reply("REPLY_ROUTE");
        if (!t_relay()) {
            sl_reply_error();
        }
    }
    
    onreply_route[REPLY_ROUTE] {
        if (has_body("application/sdp")) {
            rtpengine_manage("replace-origin replace-session-connection");
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kamailio
  labels:
    app: kamailio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kamailio
  template:
    metadata:
      labels:
        app: kamailio
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: kamailio
        image: telephoneorg/kamailio:latest
        command: ["/usr/sbin/kamailio", "-DD", "-E", "-f", "/etc/kamailio/kamailio.cfg"]
        ports:
        - containerPort: 5060
          protocol: UDP
          name: sip-udp
        - containerPort: 5060
          protocol: TCP
          name: sip-tcp
        volumeMounts:
        - name: config-volume
          mountPath: /etc/kamailio/kamailio.cfg
          subPath: kamailio.cfg
      volumes:
      - name: config-volume
        configMap:
          name: kamailio-config
---
apiVersion: v1
kind: Service
metadata:
  name: kamailio-service
spec:
  type: ClusterIP
  selector:
    app: kamailio
  ports:
  - port: 5060
    targetPort: 5060
    protocol: UDP
    name: sip-udp
  - port: 5060
    targetPort: 5060
    protocol: TCP
    name: sip-tcp
