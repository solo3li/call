apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
      - name: pgadmin
        image: "{{ .Values.pgadmin.image }}"
        env:
        - name: PGADMIN_DEFAULT_EMAIL
          value: "{{ .Values.pgadmin.email }}"
        - name: PGADMIN_DEFAULT_PASSWORD
          value: "{{ .Values.pgadmin.password }}"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
spec:
  ports:
  - port: 5050
    targetPort: 80
  selector:
    app: pgadmin
