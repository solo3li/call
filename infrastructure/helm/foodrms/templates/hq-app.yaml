apiVersion: apps/v1
kind: Deployment
metadata:
  name: hq-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hq-app
  template:
    metadata:
      labels:
        app: hq-app
    spec:
      containers:
      - name: hq-app
        image: "{{ .Values.hqApp.image }}"
        imagePullPolicy: Never
        env:
        - name: RUNNING_IN_DOCKER
          value: "true"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hq-app
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: hq-app
