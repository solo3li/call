apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: foodrms-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: foodrms-backend:latest
          ports:
            - containerPort: 5109
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: ConnectionStrings__DefaultConnection
              value: "Host=postgres.foodrms-ns.svc.cluster.local;Database=foodrms;Username=$(PG_USER);Password=$(PG_PASSWORD)"
          volumeMounts:
            - name: uploads-storage
              mountPath: /app/wwwroot/uploads
      volumes:
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: backend-uploads-pvc
