[general]
static=yes
writeprotect=no

[public]
; ============================
; رقم 100 - موظف بشري
; ============================
exten => 100,1,Answer()
same  => n,MixMonitor(/var/spool/asterisk/monitor/${STRFTIME(${EPOCH},,%Y%m%d_%H%M%S)}_${CALLERID(num)}_human.wav)
same  => n,Dial(SIP/100,30)
same  => n,Hangup()

exten => h,1,System(curl -s -X POST "http://backend:5109/api/internal/asterisk/upload-recording?caller=${CALLERID(num)}&ai=0" -F "file=@/var/spool/asterisk/monitor/${STRFTIME(${EPOCH},,%Y%m%d_%H%M%S)}_${CALLERID(num)}_human.wav" &)

; ============================
; رقم 101 - موظف بشري 2
; ============================
exten => 101,1,Answer()
same  => n,MixMonitor(/var/spool/asterisk/monitor/${STRFTIME(${EPOCH},,%Y%m%d_%H%M%S)}_${CALLERID(num)}_human2.wav)
same  => n,Dial(SIP/101,30)
same  => n,Hangup()

; ============================
; رقم 200 - الذكاء الاصطناعي
; ============================
exten => 200,1,Answer()
same  => n,Set(CALLTIME=${STRFTIME(${EPOCH},,%Y%m%d_%H%M%S)})
same  => n,Set(CALLFILE=/var/spool/asterisk/monitor/${CALLTIME}_${CALLERID(num)}_ai.wav)
same  => n,MixMonitor(${CALLFILE})
same  => n,Dial(SIP/livekit/200,60)
same  => n,Hangup()

exten => h,1,NoOp(Uploading recording: ${CALLFILE})
same  => n,System(curl -s -X POST "http://backend:5109/api/internal/asterisk/upload-recording?caller=${CALLERID(num)}&ai=1" -F "file=@${CALLFILE}" > /tmp/upload_result.txt 2>&1 &)
