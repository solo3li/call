[general]
static=yes
writeprotect=no

[from-internal]
; ===== AI Agent (200) =====
exten => 200,1,Answer()
same  => n,Set(CALLTIME=${STRFTIME(${EPOCH},,%Y%m%d_%H%M%S)})
same  => n,Set(CALLFILE=/var/spool/asterisk/monitor/${CALLTIME}_${CALLERID(num)}_ai.wav)
same  => n,MixMonitor(${CALLFILE})
same  => n,Dial(SIP/livekit/200,60)
same  => n,Hangup()

; ===== Post-Call Upload for AI =====
exten => h,1,NoOp(Uploading AI recording)
same  => n,System(sleep 1 && curl -s -X POST "http://backend:5109/api/internal/asterisk/upload-recording?caller=${CALLERID(num)}&ai=1" -F "file=@${CALLFILE}" &)


